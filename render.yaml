services:
  - type: web
    name: nexus-load-balancer
    runtime: docker
    plan: free
    region: oregon
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_TLS
        value: "True"
